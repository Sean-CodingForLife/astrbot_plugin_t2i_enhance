name: t2i_enhance
display_name: T2I Enhance
short_desc: 为自定义 HTML T2I 模板预渲染 Markdown，保留结构并避免污染官方内置模板。
desc: 为直接渲染 {{ text | safe }} 的自定义 AstrBot T2I 模板预渲染 Markdown，并支持配置 sanitizer 和模板排除列表。
help: 适用于直接渲染 {{ text | safe }} 的自定义 HTML T2I 模板。官方内置 Markdown 模板默认会被排除，具体行为可在插件设置中调整。
