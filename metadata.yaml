name: t2i_enhance
display_name: T2I Enhance
short_desc: 自维护 HTML 模板与变量注入的 T2I 增强插件，支持多背景图切换。
desc: 插件在命中 AstrBot T2I 条件时，使用 template_profiles 中自维护的 HTML 模板、自定义变量、时间变量与背景图候选，通过 html_render(HTML, data, options) 独立完成渲染；不读取、不绑定任何官方模板内容。
help: 适用于需要绕开官方模板变量限制、由插件直接掌控模板内容、变量注入与截图选项的场景。插件不修改 AstrBot Core，仍遵循官方 T2I 开关与阈值逻辑，并对模板内容提供最小安全校验。
version: v1.0.0
astrbot_version: ">=4.26,<5"
support_platforms:
  - aiocqhttp
  - qq_official
  - qq_official_webhook
  - telegram
  - wecom
  - wecom_ai_bot
  - lark
  - dingtalk
  - discord
  - slack
  - kook
  - vocechat
  - weixin_official_account
  - weixin_oc
  - satori
  - misskey
  - line
  - matrix
  - mattermost
author: Codex
repo: https://github.com/Sean-CodingForLife/astrbot_plugin_t2i_enhance
