name: t2i_enhance
display_name: T2I Enhance
short_desc: 按官方模板名绑定增强配置，接管 AstrBot T2I 渲染并兼容官方默认正文变量。
desc: 插件会按当前 AstrBot 已激活的 T2I 模板名匹配对应的增强配置组，读取当前模板内容后，自主调用 html_render(HTML, data, options)，为不同官方模板分别注入日期时间、背景图、自定义变量以及 HTML/Markdown 增强结果，并默认兼容官方模板里的 text 正文变量。
help: 适用于已经在 AstrBot 中维护多个 T2I 模板，并希望按模板分别管理变量注入、背景图和渲染参数的场景。插件不改 AstrBot Core，只接管当前激活模板的渲染流程，同时兼容官方默认模板正文写法。
version: v2.2.1
astrbot_version: ">=4.26,<5"
support_platforms:
  - aiocqhttp
  - qq_official
  - qq_official_webhook
  - telegram
  - wecom
  - wecom_ai_bot
  - lark
  - dingtalk
  - discord
  - slack
  - kook
  - vocechat
  - weixin_official_account
  - weixin_oc
  - satori
  - misskey
  - line
  - matrix
  - mattermost
author: Codex
repo: https://github.com/Sean-CodingForLife/astrbot_plugin_t2i_enhance
