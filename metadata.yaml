name: t2i_enhance
display_name: T2I Enhance
short_desc: 通过插件后端直接调用 html_render，自主选择模板并注入变量，全面增强 AstrBot 文本转图片能力。
desc: 该插件不再只做 Markdown 预处理，而是直接接管符合条件的 T2I 文本渲染流程，自主调用 html_render(HTML, data, options)，支持多模板切换、后端变量注入、日期时间、背景图候选、自定义变量与 HTML/Markdown 安全清洗。
help: 适用于需要由插件后端控制 HTML 模板、模板变量、背景图和渲染方式的 AstrBot T2I 场景。插件会在命中 AstrBot T2I 触发阈值后，自行构造模板数据并输出图片结果。
version: v2.0.0
astrbot_version: ">=4.26,<5"
support_platforms:
  - aiocqhttp
  - qq_official
  - qq_official_webhook
  - telegram
  - wecom
  - wecom_ai_bot
  - lark
  - dingtalk
  - discord
  - slack
  - kook
  - vocechat
  - weixin_official_account
  - weixin_oc
  - satori
  - misskey
  - line
  - matrix
  - mattermost
author: Codex
repo: https://github.com/Sean-CodingForLife/astrbot_plugin_t2i_enhance
